{% extends "base.html" %}
{% set title = "Registrar Movimiento" %}
{% set active = "expense" %}
{% block content %}
<section class="bg-white rounded-xl p-4 shadow-sm max-w-2xl">
  <h2 class="font-bold text-lg mb-3">Registrar gasto o ingreso</h2>
  <form method="post" class="grid gap-3">
    <label class="text-sm font-semibold">
      Descripción
      <input required name="description" class="mt-1 w-full rounded-lg border-slate-300" placeholder="Ej. Supermercado">
    </label>

    <div class="grid sm:grid-cols-3 gap-3">
      <label class="text-sm font-semibold sm:col-span-2">
        Monto
        <input required type="number" step="0.01" min="0.01" name="amount" class="mt-1 w-full rounded-lg border-slate-300" placeholder="0.00">
      </label>
      <label class="text-sm font-semibold">
        Tipo
        <select name="kind" class="mt-1 w-full rounded-lg border-slate-300">
          <option value="expense">Gasto</option>
          <option value="income">Ingreso</option>
        </select>
      </label>
    </div>

    <div class="grid sm:grid-cols-2 gap-3">
      <label class="text-sm font-semibold">
        Categoría
        <select required name="category_id" class="mt-1 w-full rounded-lg border-slate-300">
          {% for c in data.categories %}
          <option value="{{ c.id }}">{{ c.name }}</option>
          {% endfor %}
        </select>
      </label>
      <label class="text-sm font-semibold">
        Fecha
        <input type="date" name="date" class="mt-1 w-full rounded-lg border-slate-300">
      </label>
    </div>

    <button class="rounded-lg bg-blue-600 text-white font-bold py-2.5">Guardar movimiento</button>
  </form>
</section>
{% endblock %}
