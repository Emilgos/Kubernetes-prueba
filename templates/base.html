<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or "Antigravity Finanzas" }}</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
  <style>
    body { font-family: "Manrope", sans-serif; }
    .icon { font-family: "Material Symbols Outlined"; font-size: 20px; line-height: 1; }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
  <div class="max-w-5xl mx-auto p-4 sm:p-6">
    <header class="mb-6">
      <h1 class="text-2xl font-extrabold">Antigravity Finanzas</h1>
      <p class="text-sm text-slate-600">Registra, controla y ahorra en un solo lugar.</p>
    </header>

    <nav class="mb-6 grid grid-cols-2 sm:grid-cols-6 gap-2">
      <a href="{{ url_for('dashboard') }}" class="rounded-lg px-3 py-2 text-sm font-semibold {% if active == 'dashboard' %}bg-blue-600 text-white{% else %}bg-white{% endif %}">Dashboard</a>
      <a href="{{ url_for('add_expense') }}" class="rounded-lg px-3 py-2 text-sm font-semibold {% if active == 'expense' %}bg-blue-600 text-white{% else %}bg-white{% endif %}">Registrar</a>
      <a href="{{ url_for('budgets') }}" class="rounded-lg px-3 py-2 text-sm font-semibold {% if active == 'budgets' %}bg-blue-600 text-white{% else %}bg-white{% endif %}">Presupuestos</a>
      <a href="{{ url_for('goals') }}" class="rounded-lg px-3 py-2 text-sm font-semibold {% if active == 'goals' %}bg-blue-600 text-white{% else %}bg-white{% endif %}">Metas</a>
      <a href="{{ url_for('history') }}" class="rounded-lg px-3 py-2 text-sm font-semibold {% if active == 'history' %}bg-blue-600 text-white{% else %}bg-white{% endif %}">Historial</a>
      <a href="{{ url_for('settings') }}" class="rounded-lg px-3 py-2 text-sm font-semibold {% if active == 'settings' %}bg-blue-600 text-white{% else %}bg-white{% endif %}">Ajustes</a>
    </nav>

    {% block content %}{% endblock %}
  </div>
</body>
</html>
