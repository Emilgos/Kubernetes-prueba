{% extends "base.html" %}
{% set title = "Ajustes" %}
{% set active = "settings" %}
{% block content %}
<section class="grid lg:grid-cols-2 gap-4">
  <article class="bg-white rounded-xl p-4 shadow-sm">
    <h2 class="font-bold mb-3">Configuración general</h2>
    <form method="post" class="space-y-3">
      <input type="hidden" name="action" value="general">
      <label class="text-sm font-semibold block">
        Moneda
        <input name="currency" value="{{ data.currency }}" class="mt-1 w-full rounded-lg border-slate-300" placeholder="$">
      </label>
      <label class="flex items-center gap-2 text-sm font-semibold">
        <input type="checkbox" name="budget_alerts" {% if data.budget_alerts %}checked{% endif %} class="rounded border-slate-300">
        Activar alertas de presupuesto
      </label>
      <button class="rounded-lg bg-blue-600 text-white font-bold py-2.5 px-4">Guardar ajustes</button>
    </form>

    <div class="mt-4 pt-4 border-t">
      <a href="{{ url_for('export_csv') }}" class="inline-block rounded-lg bg-slate-800 text-white px-4 py-2 font-semibold">Exportar CSV (Excel)</a>
    </div>
  </article>

  <article class="bg-white rounded-xl p-4 shadow-sm">
    <h2 class="font-bold mb-3">Gestionar categorías</h2>
    <form method="post" class="space-y-3 mb-4">
      <input type="hidden" name="action" value="category">
      <label class="text-sm font-semibold block">
        Nombre
        <input required name="name" class="mt-1 w-full rounded-lg border-slate-300" placeholder="Ej. Salud">
      </label>
      <label class="text-sm font-semibold block">
        Icono (Material Symbol)
        <input name="icon" class="mt-1 w-full rounded-lg border-slate-300" placeholder="health_and_safety">
      </label>
      <button class="rounded-lg bg-blue-600 text-white font-bold py-2.5 px-4">Agregar categoría</button>
    </form>

    <div class="space-y-2">
      {% for c in data.categories %}
      <div class="flex items-center justify-between border rounded-lg p-2 text-sm">
        <span class="flex items-center gap-2"><span class="icon">{{ c.icon }}</span>{{ c.name }}</span>
        <code class="text-xs text-slate-500">{{ c.id }}</code>
      </div>
      {% endfor %}
    </div>
  </article>
</section>
{% endblock %}
